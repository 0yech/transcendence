name: Prettier Lint

on: [pull_request]

permissions:
  contents: read
  pull-requests: read

jobs:
  prettier-lint:
    name: Run Prettier Lint
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run Prettier check
        run: npx prettier --check .
