name: transcendence
services:
  frontend:
    container_name: frontend
    build:
      context: ./frontend
      target: development
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "5173:5173"
    volumes:
      # Mount the source for hot reloads
      - ./frontend:/app
      # Anonymous volume that "masks" the mount above for this one path, keeping
      # the container's Linux-built node_modules instead of the host's
      - /app/node_modules
    # networks:
  backend:
    container_name: backend
    build:
      context: ./backend
      target: development
    restart: unless-stopped
    depends_on:
      - database
    env_file:
      - .env.example
    ports:
      - "3000:3000"
      # Prisma Studio (backgrounded in the command below)
      - "5555:5555"
    volumes:
      # Mount the source for hot reloads
      - ./backend:/app
      # Anonymous volume that "masks" the mount above for this one path, keeping
      # the container's Linux-built node_modules instead of the host's
      - /app/node_modules
    command: 'sh -c "npx prisma db push && npx prisma generate && (npx prisma studio --port 5555 --browser none &) && npm run start:dev"'
  database:
    container_name: database
    image: postgres:16-alpine
    restart: unless-stopped
    env_file:
      - .env.example
    ports:
      - "5432:5432"
    volumes:
      - database_data:/var/lib/postgresql/data

volumes:
  database_data:
