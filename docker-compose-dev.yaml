name: transcendence
services:
  frontend:
    container_name: frontend
    build:
      context: ./frontend
      target: development
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "5173:5173"
    volumes:
      # Mount the source for hot reloads
      - ./frontend:/app
      # Anonymous volume that "masks" the mount above for this one path, keeping
      # the container's Linux-built node_modules instead of the host's
      - /app/node_modules
    # networks:
  backend:
    container_name: backend
    build:
      context: ./backend
      target: development
    restart: unless-stopped
    ports:
      - "3000:3000"
    volumes:
      # Mount the source for hot reloads
      - ./backend:/app
      # Anonymous volume that "masks" the mount above for this one path, keeping
      # the container's Linux-built node_modules instead of the host's
      - /app/node_modules
    # environment:
    # secrets:
    # networks:
  # database:
  # container_name: database
  # image:
  # restart: unless-stopped
  # environment:
  # secrets:
  # volumes:
  # networks:

# secrets:

# volumes:

networks:
  transcendence:
